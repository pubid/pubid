name: downstream-test

on:
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [ tests-passed, release-passed ]

# Jobs only check out code and run rake; no write access to the repo is needed.
permissions:
  contents: read

jobs:
  build-matrix:
    uses: metanorma/ci/.github/workflows/prepare-rake.yml@main

  discover-gems:
    name: Discover pubid gems
    runs-on: ubuntu-latest
    outputs:
      gems: ${{ steps.find-gems.outputs.gems }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
    - name: Find all pubid gems
      id: find-gems
      run: |
        # Find pubid gemspec at root (V2 single-gem layout)
        if [ -f "pubid.gemspec" ]; then
          gems='["pubid"]'
        else
          gems='[]'
        fi
        echo "Found gems: $gems"
        echo "gems=$gems" >> $GITHUB_OUTPUT

  discover-repositories:
    name: Discover downstream repositories
    runs-on: ubuntu-latest
    outputs:
      repositories: ${{ steps.find-repos.outputs.repositories }}
      combined_matrix: ${{ steps.combined-matrix.outputs.value }}
    needs:
    - build-matrix
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
    - name: Find downstream repositories
      id: find-repos
      run: |
        # Read the downstream-tests.json configuration
        repositories=$(jq -c '.repositories' downstream-tests.json)
        echo "Found repositories: $repositories"
        echo "repositories=$repositories" >> $GITHUB_OUTPUT
    - name: Create combined matrix
      id: combined-matrix
      run: |
        # Create combined matrix for repositories and ruby versions
        ruby_matrix='${{ needs.build-matrix.outputs.matrix }}'
        repositories_array='${{ steps.find-repos.outputs.repositories }}'

        # Debug output
        echo "Ruby matrix structure:"
        echo "$ruby_matrix" | jq '.'
        echo "Repositories array:"
        echo "$repositories_array" | jq '.'

        # Create combined matrix
        combined=$(echo "$ruby_matrix" | jq --argjson repos "$repositories_array" '
          . as $ruby_matrix |
          $repos as $repo_list |
          {
            "include": [
              $repo_list[] as $repo |
              $ruby_matrix.ruby[] as $ruby |
              $ruby_matrix.os[] as $os |
              ($ruby + {"repository": $repo, "os": $os})
            ]
          }
        ')

        echo "Combined matrix:"
        echo "$combined" | jq '.'
        echo "value=$(echo ${combined} | tr '\n' ' ')" >> $GITHUB_OUTPUT

  rake:
    name: ${{ matrix.repository.description }} ${{ matrix.version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
    - build-matrix
    - discover-gems
    - discover-repositories

    concurrency:
      group: '${{ matrix.flavor }}-${{ matrix.os }}-${{ matrix.version }}-${{ matrix.repository.repo }}-${{ github.head_ref || github.ref_name }}'
      cancel-in-progress: true

    continue-on-error: ${{ matrix.experimental }}
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-repositories.outputs.combined_matrix) }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    - uses: actions/checkout@v4
      with:
        repository: ${{ matrix.repository.owner }}/${{ matrix.repository.repo }}
        submodules: true
        path: dependent

    - name: Initial Ruby setup to generate Gemfile.lock
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.version }}
        rubygems: ${{ matrix.rubygems }}
        bundler-cache: true
        working-directory: dependent

    - name: Replace rubygems's pubid gems with local ones
      shell: python
      run: |
        import sys
        import os
        import json
        import re
        print("Python version:", sys.version)

        # We must make the downstream gem test THIS PR's pubid checkout (at ../),
        # not whatever pubid its Gemfile/Gemfile.lock resolves from git or
        # rubygems. Relying on the downstream `git: branch: "main"` pin loaded a
        # STALE cached revision, so partial-ref features under test were absent.
        # A `path:` source is always read from disk, sidestepping git caching.

        # Authoritative gem list from the discover-gems job (V2: ["pubid"]),
        # augmented by any pubid* gems the lockfile actually resolved.
        pubid_gems = list(json.loads('${{ needs.discover-gems.outputs.gems }}'))

        gemfile_lock_path = "Gemfile.lock"
        if os.path.exists(gemfile_lock_path):
          print(f"Scanning {gemfile_lock_path} for pubid gems...")
          with open(gemfile_lock_path, 'r') as f:
            for raw in f:
              # Match a spec line under a `specs:` block, e.g. "    pubid (2.0.0)".
              # The prior code compared against "SPECS" (never present — the real
              # header is the lowercase, indented `specs:`), so it found nothing
              # and silently skipped the local override.
              m = re.match(r'^\s{4,}(pubid(?:-[\w-]+)?)\s+\(', raw)
              if m and m.group(1) not in pubid_gems:
                pubid_gems.append(m.group(1))
        print(f"pubid gems to override: {pubid_gems}")

        # Map each gem to its local gemspec at ../ (V2 single-gem layout has only
        # pubid.gemspec). Skip any gem without a matching local gemspec.
        overrides = {}
        for gem in pubid_gems:
          if os.path.exists(f"../{gem}.gemspec"):
            overrides[gem] = f'gem "{gem}", path: "../"'
          else:
            print(f"Warning: ../{gem}.gemspec not found; cannot override {gem} locally")

        if not overrides:
          print("ERROR: no local pubid gem could be resolved for override; "
                "the downstream test would silently run against a remote/stale "
                "pubid instead of this PR. Failing so the problem is visible.")
          sys.exit(1)

        # Rewrite the Gemfile: replace any existing declaration of each pubid gem
        # (whatever its source) with the local path, or append it when the gem is
        # only pulled in transitively. Replacing (not just appending) avoids a
        # "same gem declared twice" bundler error and guarantees the local copy
        # wins over the downstream's own `git:`/rubygems declaration.
        with open("Gemfile", "r") as f:
          gemfile = f.read()

        for gem, local_line in overrides.items():
          pattern = re.compile(
            r'^[ \t]*gem\s+["\']' + re.escape(gem) + r'["\'].*$', re.MULTILINE)
          if pattern.search(gemfile):
            gemfile = pattern.sub(local_line, gemfile)
            print(f"Replaced existing '{gem}' declaration -> {local_line}")
          else:
            gemfile += f'\n# Local pubid gem for testing\n{local_line}\n'
            print(f"Appended local declaration -> {local_line}")

        with open("Gemfile", "w") as f:
          f.write(gemfile)

        # Remove Gemfile.lock to force re-resolution against the local path.
        if os.path.exists(gemfile_lock_path):
          os.remove(gemfile_lock_path)
          print("Removed Gemfile.lock to force re-resolution")

        print("\n> Updated Gemfile:")
        sys.stdout.flush()
        os.system("tail -30 Gemfile")
      working-directory: dependent

    - name: Remove existing msys64 symlink (Windows only)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $rubyVersion = ruby -e "puts RUBY_VERSION"
        $target = "C:\hostedtoolcache\windows\Ruby\$rubyVersion\x64\msys64"
        if (Test-Path $target) {
          Remove-Item $target -Force -Recurse
          Write-Host "Removed $target"
        } else {
          Write-Host "$target does not exist"
        }

    - name: Re-setup Ruby with local pubid gems
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.version }}
        rubygems: ${{ matrix.rubygems }}
        bundler-cache: true
        working-directory: dependent

    - run: bundle exec rake
      working-directory: dependent
