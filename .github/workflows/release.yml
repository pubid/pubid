# Releases the root pubid gem to RubyGems and creates a GitHub release.
# V2 single-gem layout: builds and pushes only ./pubid.gemspec.
name: release

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next version (e.g. 2.0.0.pre.alpha.1, 2.0.1, major, minor, patch, pre).
          Pass 'skip' to re-push the current version without bumping.
        required: true
        type: string
      dry_run:
        description: 'Dry run (build only, do not push or tag)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.ref_name }}

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Install gem-release
      run: gem install gem-release

    - name: Bump version
      if: ${{ inputs.next_version != 'skip' }}
      run: gem bump --version "${{ inputs.next_version }}" --no-commit

    - name: Read version
      id: version
      run: |
        NEW_VERSION=$(ruby -e "require_relative 'lib/pubid/version'; puts Pubid::VERSION")
        echo "value=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        if [[ "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        fi
        echo "Resolved version: $NEW_VERSION"

    - name: Commit and tag
      if: ${{ !inputs.dry_run && inputs.next_version != 'skip' }}
      run: |
        git commit -am "Bump version to ${{ steps.version.outputs.value }}"
        git tag "v${{ steps.version.outputs.value }}"

    - name: Build gem
      run: gem build pubid.gemspec

    - name: Push gem to RubyGems
      if: ${{ !inputs.dry_run }}
      env:
        RUBYGEMS_API_KEY: ${{ secrets.METANORMA_CI_RUBYGEMS_API_KEY }}
      run: |
        mkdir -p ~/.gem
        cat > ~/.gem/credentials << EOF
        ---
        :rubygems_api_key: ${RUBYGEMS_API_KEY}
        EOF
        chmod 0600 ~/.gem/credentials
        gem push "pubid-${{ steps.version.outputs.value }}.gem"

    - name: Push branch and tag
      if: ${{ !inputs.dry_run && inputs.next_version != 'skip' }}
      run: |
        git push origin "HEAD:${{ github.ref_name }}"
        git push origin "v${{ steps.version.outputs.value }}"

    - name: Create GitHub Release
      if: ${{ !inputs.dry_run && inputs.next_version != 'skip' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        FLAGS=()
        if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
          FLAGS+=(--prerelease)
        fi
        gh release create "v${{ steps.version.outputs.value }}" \
          --title "Release v${{ steps.version.outputs.value }}" \
          --notes "Prerelease of pubid V2 (single-gem layout)." \
          --target "${{ github.sha }}" \
          "${FLAGS[@]}"

    - name: Dry-run summary
      if: ${{ inputs.dry_run }}
      run: |
        echo "## Dry-run summary"
        echo "Would have released pubid ${{ steps.version.outputs.value }} (prerelease=${{ steps.version.outputs.prerelease }})"
        ls -la ./*.gem || true
