name: rake

on:
  push:
    branches: [ main, master ]
    tags: [ v* ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  actions: read
  checks: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Run V2 tests
        run: |
          bundle exec rspec spec/pubid_new/iso/scheme_spec.rb spec/pubid_new/iso/identifier_spec.rb spec/pubid_new/iso/parser_spec.rb spec/pubid_new/iso/builder_spec.rb --format progress
      - name: Verify performance benchmarks
        run: |
          ruby spec/benchmarks/performance_test.rb | head -50
