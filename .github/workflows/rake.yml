name: rake

on:
  push:
    branches: [ main, master ]
    tags: [ v* ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  actions: read
  checks: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Run V2 tests
        run: |
          bundle exec rspec spec/pubid_new/ --format progress --format json --out rspec-results.json
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspec-results
          path: rspec-results.json

  rake:
    # Conditional job that only runs if gems/ directory has changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if gems directory exists
        id: check-gems
        run: |
          if [ -d "gems" ] && [ -n "$(ls -A gems)" ]; then
            echo "gems_dir_exists=true" >> $GITHUB_OUTPUT
          else
            echo "gems_dir_exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Skip V1 tests
        if: steps.check-gems.outputs.gems_dir_exists != 'true'
        run: |
          echo "No gems/ directory found - skipping V1 tests"
      - name: Set up Ruby
        if: steps.check-gems.outputs.gems_dir_exists == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: gems
      - name: Run V1 tests
        if: steps.check-gems.outputs.gems_dir_exists == 'true'
        working-directory: gems
        run: |
          for gem_dir in gems/*/; do
            gem_name=$(basename "$gem_dir")
            echo "Testing $gem_name..."
            cd "$gem_dir"
            bundle exec rspec || true
            cd ../..
          done
